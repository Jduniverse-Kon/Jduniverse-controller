<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Just Dance Universe Controller</title>
    <style>
        /* Just Dance Dark Neon Aesthetic */
        body { background: radial-gradient(circle, #20003b 0%, #050010 100%); color: white; text-align: center; font-family: 'Arial Black', sans-serif; padding: 40px 20px; margin: 0; overflow-x: hidden; }
        h1 { font-size: 28px; text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 0 10px #ff0077, 0 0 20px #ff0077; margin-bottom: 30px; }
        .card { background: rgba(255, 255, 255, 0.05); border: 3px solid #00f0ff; border-radius: 20px; padding: 25px; box-shadow: 0 0 15px rgba(0, 240, 255, 0.3); max-width: 350px; margin: 0 auto; }
        input { width: 80%; padding: 12px; font-size: 18px; border-radius: 10px; border: 2px solid #ff0077; background: #111; color: white; text-align: center; margin-bottom: 20px; font-family: Arial, sans-serif; }
        .avatar-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 25px; }
        .avatar { width: 70px; height: 70px; border-radius: 50%; border: 3px solid transparent; cursor: pointer; transition: 0.2s; background: #222; }
        .avatar.selected { border-color: #00f0ff; box-shadow: 0 0 15px #00f0ff; transform: scale(1.1); }
        button { padding: 18px 35px; font-size: 20px; background: linear-gradient(45deg, #ff0077, #ff00ff); color: white; border: none; border-radius: 50px; font-weight: bold; box-shadow: 0 4px 20px rgba(255,0,119,0.5); cursor: pointer; text-transform: uppercase; width: 85%; }
        button:active { transform: scale(0.98); }
        #gameScreen { display: none; }
        #status { font-size: 16px; margin-top: 20px; color: #00f0ff; text-transform: uppercase; }
    </style>
</head>
<body>

    <h1>Just Dance Universe</h1>

    <!-- SCREEN 1: DANCER CARD CREATION -->
    <div id="setupScreen" class="card">
        <h3 style="color: #00f0ff; margin-top:0;">CREATE DANCER CARD</h3>
        <input type="text" id="nicknameInput" placeholder="ENTER NICKNAME" maxlength="12">
        
        <p style="font-size: 14px; color: #aaa;">CHOOSE AVATAR</p>
        <div class="avatar-grid">
            <!-- Placeholders for avatars. In production, use real image URLs -->
            <div class="avatar selected" data-id="1" style="background: #ff0077;"></div>
            <div class="avatar" data-id="2" style="background: #00f0ff;"></div>
            <div class="avatar" data-id="3" style="background: #ffaa00;"></div>
        </div>
        
        <button id="saveBtn">DANCE!</button>
    </div>

    <!-- SCREEN 2: ACTIVE GAMEPLAY CONTROLLER -->
    <div id="gameScreen" class="card" style="border-color: #ff0077; box-shadow: 0 0 15px rgba(255, 0, 119, 0.3);">
        <p id="controllerCardName" style="font-size: 24px; color: #ff0077; margin: 0 0 10px 0;"></p>
        <p>Hold phone firmly in your <b>RIGHT HAND</b> and follow the coach!</p>
        <p id="status">Connecting to PC...</p>
    </div>

    <script>
        let webSocket;
        let selectedAvatar = "1";
        const urlParams = new URLSearchParams(window.location.search);
        const pcIP = urlParams.get('ip');

        // Handle Avatar Selection Graphics
        document.querySelectorAll('.avatar').forEach(avatar => {
            avatar.addEventListener('click', () => {
                document.querySelectorAll('.avatar').forEach(a => a.classList.remove('selected'));
                avatar.classList.add('selected');
                selectedAvatar = avatar.dataset.id;
            });
        });

        // Check if a Dancer Card already exists in phone memory
        if (localStorage.getItem('jd_nickname')) {
            document.getElementById('nicknameInput').value = localStorage.getItem('jd_nickname');
            selectedAvatar = localStorage.getItem('jd_avatar') || "1";
            document.querySelectorAll('.avatar').forEach(a => {
                if(a.dataset.id === selectedAvatar) a.classList.add('selected');
                else a.classList.remove('selected');
            });
        }

        document.getElementById('saveBtn').addEventListener('click', async () => {
            const nickname = document.getElementById('nicknameInput').value.trim().toUpperCase();
            if (!nickname) { alert("Please enter a nickname!"); return; }

            // Save details locally so they don't have to re-enter them next time
            localStorage.setItem('jd_nickname', nickname);
            localStorage.setItem('jd_avatar', selectedAvatar);

            // Swap UI Screens
            document.getElementById('setupScreen').style.display = 'none';
            document.getElementById('gameScreen').style.display = 'block';
            document.getElementById('controllerCardName').innerText = nickname;

            // Request phone hardware motion permissions
            if (typeof DeviceMotionEvent.requestPermission === 'function') {
                try { await DeviceMotionEvent.requestPermission(); } catch(e) { console.log(e); }
            }

            // Connect to Godot Game
            connectToGame(nickname, selectedAvatar);
        });

        function connectToGame(name, avatar) {
            webSocket = new WebSocket(`ws://${pcIP}:8080`);

            webSocket.onopen = () => {
                document.getElementById('status').innerText = "CONNECTED!";
                document.getElementById('status').style.color = "#00ff88";
                
                // FIRST PACKET: Tell Godot who is logging in!
                let loginPacket = {
                    type: "login",
                    nickname: name,
                    avatar: avatar
                };
                webSocket.send(JSON.stringify(loginPacket));
            };

            webSocket.onclose = () => {
                document.getElementById('status').innerText = "DISCONNECTED";
                document.getElementById('status').style.color = "#ff0077";
            };

            // Stream continuous motion tracking packets
            window.addEventListener('devicemotion', (event) => {
                if (!webSocket || webSocket.readyState !== WebSocket.OPEN) return;
                
                let motionPacket = {
                    type: "motion",
                    x: event.accelerationIncludingGravity.x,
                    y: event.accelerationIncludingGravity.y,
                    z: event.accelerationIncludingGravity.z
                };
                webSocket.send(JSON.stringify(motionPacket));
            });
        }
    </script>
</body>
</html>
